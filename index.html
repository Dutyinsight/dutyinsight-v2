      :root { --primary: 15 35 65; --accent: 212 175 55; }

<body>
    <div id="root">
      <div style="height: 100vh; width: 100vw; display: flex; align-items: center; justify-content: center; background-color: #ffffff;">

          .initial-loader {
            width: 48px;
            height: 48px;
            border: 4px solid rgba(15, 35, 65, 0.1);
            border-left-color: #0F2341;
            border-radius: 50%;

            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
          }

        <div class="initial-loader"></div>
      </div>
