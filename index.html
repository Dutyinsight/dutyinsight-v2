<!doctype html>
<html lang="tr">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
    <meta name="theme-color" content="#0F2341" />

    <title>DutyInsight — Pre-Customs Trade Intelligence for SMEs</title>
    <meta name="description" content="Data-driven import, export, and strategy intelligence for SMEs trading across Türkiye, the EU, and Central Europe." />

    <link rel="preload" href="/fonts/fraunces-v38-latin-700.woff2" as="font" type="font/woff2" crossorigin>
    <link rel="preload" href="/fonts/inter-v20-latin-regular.woff2" as="font" type="font/woff2" crossorigin>

    <style>
      /* ⚡ YEREL FONT TANIMLAMALARI ⚡ */
      @font-face { font-family: 'Fraunces'; font-style: normal; font-weight: 300; font-display: swap; src: url('/fonts/fraunces-v38-latin-300.woff2') format('woff2'); }
      @font-face { font-family: 'Fraunces'; font-style: normal; font-weight: 400; font-display: swap; src: url('/fonts/fraunces-v38-latin-regular.woff2') format('woff2'); }
      @font-face { font-family: 'Fraunces'; font-style: normal; font-weight: 500; font-display: swap; src: url('/fonts/fraunces-v38-latin-500.woff2') format('woff2'); }
      @font-face { font-family: 'Fraunces'; font-style: normal; font-weight: 600; font-display: swap; src: url('/fonts/fraunces-v38-latin-600.woff2') format('woff2'); }
      @font-face { font-family: 'Fraunces'; font-style: normal; font-weight: 700; font-display: swap; src: url('/fonts/fraunces-v38-latin-700.woff2') format('woff2'); }

      @font-face { font-family: 'Inter'; font-style: normal; font-weight: 400; font-display: swap; src: url('/fonts/inter-v20-latin-regular.woff2') format('woff2'); }
      @font-face { font-family: 'Inter'; font-style: normal; font-weight: 500; font-display: swap; src: url('/fonts/inter-v20-latin-500.woff2') format('woff2'); }
      @font-face { font-family: 'Inter'; font-style: normal; font-weight: 600; font-display: swap; src: url('/fonts/inter-v20-latin-600.woff2') format('woff2'); }
      @font-face { font-family: 'Inter'; font-style: normal; font-weight: 700; font-display: swap; src: url('/fonts/inter-v20-latin-700.woff2') format('woff2'); }

      /* ⚡ TEMEL TASARIM KORUMASI ⚡ */
      :root { --primary: 15 35 65; --accent: 212 175 55; }
      html { scroll-behavior: smooth; -webkit-font-smoothing: antialiased; -moz-osx-font-smoothing: grayscale; font-family: Inter, -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif; }
      body { margin: 0; line-height: inherit; background-color: #fff; color: #0a0f1a; font-feature-settings: 'cv02', 'cv03', 'cv04', 'cv11'; }
      h1, .font-display, .h-display, .h-section { font-family: Fraunces, Georgia, serif !important; }
    </style>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.jsx"></script>
  </body>
